<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デジタルビンゴカード</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }
        /* ビンゴグリッド */
        .bingo-card {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            padding: 16px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            height: 100%;
        }
        /* マス目のスタイル */
        .cell {
            background-color: #f7f9fa;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s ease;
            aspect-ratio: 1 / 1;
        }
        /* タップされた時のスタイル */
        .cell.selected {
            background-color: #ff4757;
            border-color: #ff4757;
            color: #ffffff;
            transform: scale(0.95);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        /* FREEマスの初期スタイル */
        .cell.free {
            background-color: #ffa502;
            border-color: #ffa502;
            color: #ffffff;
            font-size: 14px;
        }
        /* リセットボタン */
        .btn-reset {
            margin-top: 24px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #2ed573;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(46, 213, 115, 0.2);
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:active {
            background-color: #26af5f;
        }
    </style>
</head>
<body>

    <h1>BINGO</h1>

    <div class="bingo-card">
        <div class="grid" id="bingoGrid">
            <!-- JSでここにマス目を生成します -->
        </div>
    </div>

    <button class="btn-reset" onclick="initBingo()">カードを新しくする</button>

    <script>
        // ビンゴカードの生成
        function initBingo() {
            const grid = document.getElementById('bingoGrid');
            grid.innerHTML = ''; // グリッドをリセット

            // 各列（B, I, N, G, O）の範囲
            const ranges = [
                { min: 1, max: 15 },  // B
                { min: 16, max: 30 }, // I
                { min: 31, max: 45 }, // N
                { min: 46, max: 60 }, // G
                { min: 61, max: 75 }  // O
            ];

            const columns = [];

            // 各列ごとに重複のない5つの数字を選定
            for (let i = 0; i < 5; i++) {
                const range = ranges[i];
                const pool = [];
                for (let num = range.min; num <= range.max; num++) {
                    pool.push(num);
                }
                
                const colNums = [];
                for (let j = 0; j < 5; j++) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    colNums.push(pool.splice(randomIndex, 1)[0]);
                }
                columns.push(colNums);
            }

            // 行と列を入れ替えてHTMLに配置
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    // 真ん中のマス（3行目・3列目）をFREEにする
                    if (row === 2 && col === 2) {
                        cell.innerText = 'FREE';
                        cell.classList.add('free', 'selected');
                    } else {
                        cell.innerText = columns[col][row];
                        // タップイベント（スマホ・PC両対応）
                        cell.addEventListener('click', () => {
                            cell.classList.toggle('selected');
                        });
                    }
                    grid.appendChild(cell);
                }
            }
        }

        // 初回ロード時に起動
        window.onload = initBingo;
    </script>
</body>
</html>
