<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>デジタルビンゴカード</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5; /* 全体の背景はシンプルな薄灰色に戻しました */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            overflow: hidden;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 16px;
        }
        /* ビンゴグリッド（カード本体） */
        .bingo-card {
            width: 100%;
            max-width: 300px;
            
            /* ▼ カード本体の背景に bg.jpg を指定しました */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            padding: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            height: 100%;
        }
        .cell {
            /* ▼ 背景画像が透けて見えるよう、マスの背景を少し透明（85%）にしています */
            background-color: rgba(255, 255, 255, 0.85);
            border: 2px solid rgba(225, 232, 237, 0.5);
            
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            aspect-ratio: 1 / 1;
        }
        /* タップされて穴が空いたスタイル（ここはしっかり赤で塗りつぶします） */
        .cell.selected {
            background-color: #ff4757 !important;
            border-color: #ff4757 !important;
            color: #ffffff !important;
            transform: scale(0.95);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        .cell.free {
            background-color: #ffa502;
            border-color: #ffa502;
            color: #ffffff;
            font-size: 11px;
        }
        
        /* リーチ時のカラフル点滅 */
        @keyframes rainbow-flash {
            0% { border-color: #ff4757; color: #ff4757; }
            20% { border-color: #ffa502; color: #ffa502; }
            40% { border-color: #2ed573; color: #2ed573; }
            60% { border-color: #1e90ff; color: #1e90ff; }
            80% { border-color: #9b59b6; color: #9b59b6; }
            100% { border-color: #ff4757; color: #ff4757; }
        }
        .cell.reach {
            animation: rainbow-flash 1s infinite linear;
            border-width: 3px;
            background-color: rgba(255, 255, 255, 0.95); /* リーチマスは見やすく少し濃い白に */
        }

        /* ビンゴ達成時のゴールドシャイン演出 */
        @keyframes gold-shine {
            0% { transform: scale(0.95); box-shadow: 0 0 5px #ffd700; }
            50% { transform: scale(1.05); box-shadow: 0 0 20px #ffd700; }
            100% { transform: scale(0.95); box-shadow: 0 0 5px #ffd700; }
        }
        .cell.bingo-highlight {
            background: linear-gradient(135deg, #ffd700, #ffa502) !important;
            border-color: #ffd700 !important;
            color: #fff !important;
            animation: gold-shine 1s infinite ease-in-out;
            z-index: 10;
        }

        .btn-reset {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            background-color: #2ed573;
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(46, 213, 115, 0.2);
            cursor: pointer;
            transition: background 0.2s;
            z-index: 5;
        }
        .btn-reset:active {
            background-color: #26af5f;
        }

        /* ビンゴ画面オーバーレイ */
        .bingo-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .bingo-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .bingo-text {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 10px #ff4757, 0 0 20px #ff4757, 0 0 40px #ff4757;
            transform: scale(0.3);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bingo-overlay.show .bingo-text {
            transform: scale(1);
            animation: bounce 0.8s infinite alternate ease-in-out;
        }
        .bingo-sub {
            color: #fff;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        @keyframes bounce {
            from { transform: scale(1) rotate(-5deg); }
            to { transform: scale(1.15) rotate(5deg); }
        }
    </style>
</head>
<body>

    <h1>BINGO</h1>

    <div class="bingo-card">
        <div class="grid" id="bingoGrid"></div>
    </div>

    <button class="btn-reset" onclick="initBingo()">カードを新しくする</button>

    <!-- ビンゴお祝いポップアップ -->
    <div class="bingo-overlay" id="bingoOverlay" onclick="closeBingoOverlay()">
        <div class="bingo-text">BINGO!!</div>
        <div class="bingo-sub">画面をタップして閉じる</div>
    </div>

    <script>
        let previousReachCount = 0;
        let previousBingoCount = 0;

        // リーチ音（ピコーン！）
        function playReachSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.08); 
                
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.35);
            } catch (e) {
                console.log("AudioContext blocked or not supported");
            }
        }

        // ビンゴファンファーレ音
        function playBingoSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98, 2093.00]; 
                
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    const startTime = audioCtx.currentTime + index * 0.08;
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, startTime);
                    
                    gain.gain.setValueAtTime(0.15, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(startTime);
                    osc.stop(startTime + 0.4);
                });
            } catch (e) {
                console.log("AudioContext blocked or not supported");
            }
        }

        function showBingoAnimation() {
            const overlay = document.getElementById('bingoOverlay');
            overlay.classList.add('show');
            setTimeout(() => {
                overlay.classList.remove('show');
            }, 4000);
        }

        function closeBingoOverlay() {
            document.getElementById('bingoOverlay').classList.remove('show');
        }

        function checkBingoState() {
            const cells = Array.from(document.querySelectorAll('.cell'));
            const lines = [];

            for (let r = 0; r < 5; r++) {
                lines.push([cells[r*5+0], cells[r*5+1], cells[r*5+2], cells[r*5+3], cells[r*5+4]]);
            }
            for (let c = 0; c < 5; c++) {
                lines.push([cells[0*5+c], cells[1*5+c], cells[2*5+c], cells[3*5+c], cells[4*5+c]]);
            }
            lines.push([cells[0], cells[6], cells[12], cells[18], cells[24]]);
            lines.push([cells[4], cells[8], cells[12], cells[16], cells[20]]);

            let currentBingoLines = [];
            let reachCells = new Set();

            lines.forEach(line => {
                const selectedCount = line.filter(c => c.classList.contains('selected')).length;
                if (selectedCount === 5) {
                    currentBingoLines.push(line);
                } else if (selectedCount === 4) {
                    const unselected = line.find(c => !c.classList.contains('selected'));
                    if (unselected) reachCells.add(unselected);
                }
            });

            cells.forEach(cell => {
                cell.classList.remove('reach', 'bingo-highlight');
            });

            currentBingoLines.forEach(line => {
                line.forEach(cell => cell.classList.add('bingo-highlight'));
            });

            cells.forEach(cell => {
                if (reachCells.has(cell) && !cell.classList.contains('bingo-highlight')) {
                    cell.classList.add('reach');
                }
            });

            if (currentBingoLines.length > previousBingoCount) {
                playBingoSound();
                showBingoAnimation();
            } else if (reachCells.size > previousReachCount) {
                playReachSound();
            }

            previousBingoCount = currentBingoLines.length;
            previousReachCount = reachCells.size;
        }

        function initBingo() {
            const grid = document.getElementById('bingoGrid');
            grid.innerHTML = ''; 
            previousReachCount = 0;
            previousBingoCount = 0;

            const ranges = [
                { min: 1, max: 15 }, { min: 16, max: 30 }, { min: 31, max: 45 }, { min: 46, max: 60 }, { min: 61, max: 75 }
            ];
            const columns = [];

            for (let i = 0; i < 5; i++) {
                const range = ranges[i];
                const pool = Array.from({length: range.max - range.min + 1}, (_, k) => k + range.min);
                const colNums = [];
                for (let j = 0; j < 5; j++) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    colNums.push(pool.splice(randomIndex, 1)[0]);
                }
                columns.push(colNums);
            }

            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    if (row === 2 && col === 2) {
                        cell.innerText = 'FREE';
                        cell.classList.add('free', 'selected');
                    } else {
                        cell.innerText = columns[col][row];
                        cell.addEventListener('click', () => {
                            cell.classList.toggle('selected');
                            checkBingoState();
                        });
                    }
                    grid.appendChild(cell);
                }
            }
            checkBingoState();
        }

        window.onload = initBingo;
    </script>
</body>
</html>
